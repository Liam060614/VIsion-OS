<Playbook>
	<Name>VIsion OS</Name>
	<Username>VIsion</Username>
	<Title>VIsion OS v1.0</Title>
	<ShortDescription>VIsion OS - Maximum FPS Gaming Optimization for Windows 11</ShortDescription>
	<Description><![CDATA[╭───────────── ⚡ VIsion OS ─────────────╮
│     The ultimate gaming Windows build.     │
│          Maximum FPS. Zero Delay.          │
╰────────────────────────────────────────╯

VIsion OS removes Windows bloat and applies deep gaming optimizations — all automated in one setup.]]></Description>
	<Details>A custom gaming-optimized Windows build with deep FPS tweaks, input delay removal, GPU optimizations, and full debloat baked in.</Details>
	<ProgressText><![CDATA[VIsion OS is applying your gaming optimizations. Sit back — this takes 15-30 minutes. Your PC will restart automatically.]]></ProgressText>
	<Version>1.0.0</Version>
	<SupportedBuilds>
		<!-- 24H2 -->
		<string>26100</string>
		<!-- 25H2 -->
		<string>26200</string>
	</SupportedBuilds>
	<UpgradableFrom>0.4.1</UpgradableFrom>
	<Requirements>
		<Requirement>DefenderToggled</Requirement>
		<Requirement>NoAntivirus</Requirement>
		<Requirement>Internet</Requirement>
		<Requirement>NoPendingUpdates</Requirement>
		<Requirement>UCPDDisabled</Requirement>
		<Requirement>PluggedIn</Requirement>
	</Requirements>
	<UniqueId>00000000-0000-4000-7669-73696f6e2031</UniqueId>
	<InstallGuide>https://pc-tweaks.vercel.app/os</InstallGuide>
	<Overhaul>true</Overhaul>
	<UseKernelDriver>false</UseKernelDriver>
	<AllowUnsupportedUpgrades>false</AllowUnsupportedUpgrades>
	<ProductCode>64</ProductCode>
	<EstimatedMinutes>25</EstimatedMinutes>
	<Git>https://github.com/Liam060614/VIsion-OS</Git>
	<Website>https://pc-tweaks.vercel.app</Website>
	<SupportsISO>true</SupportsISO>
	<OOBE>
		<BulletPoints>
			<BulletPoint Icon="Rocket" Title="Maximum FPS"
			Description="Deep GPU tweaks, IFEO game priority, MMCSS tuning, NVIDIA driver optimizations all baked in."/>
			<BulletPoint Icon="Lock" Title="Zero Input Delay"
			Description="0.5ms timer resolution, raw mouse, MPO off, DWM latency minimized, USB always-on."/>
			<BulletPoint Icon="Privacy" Title="Full Debloat"
			Description="Xbox, OneDrive, Cortana, Teams, Bing, telemetry and 30+ bloat services permanently removed."/>
		</BulletPoints>
		<Internet>Force</Internet>
	</OOBE>
	<ISO>
		<DisableBitLocker>true</DisableBitLocker>
		<DisableHardwareRequirements>true</DisableHardwareRequirements>
	</ISO>
	<FeaturePages>
		<RadioPage IsRequired="true" DefaultOption="defender-enable" Description="Disabling Defender reduces security, recommended for gaming-only PCs.">
			<TopLine Text="Can be changed after setup."/>
			<Options>
				<RadioOption>
					<Text>Enable Defender (recommended)</Text>
					<Name>defender-enable</Name>
				</RadioOption>
				<RadioOption>
					<Text>Disable Defender</Text>
					<Name>defender-disable</Name>
				</RadioOption>
			</Options>
		</RadioPage>
		<RadioPage IsRequired="true" DefaultOption="auto-updates-disable" Description="Updates can reset some tweaks. Disable recommended for gaming PCs.">
			<TopLine Text="Security patches still work either way."/>
			<Options>
				<RadioOption>
					<Text>Disable Automatic Windows Updates (recommended)</Text>
					<Name>auto-updates-disable</Name>
				</RadioOption>
				<RadioOption>
					<Text>Enable Automatic Windows Updates</Text>
					<Name>auto-updates-default</Name>
				</RadioOption>
			</Options>
		</RadioPage>
		<CheckboxPage IsRequired="true" Description="Select your performance options.">
			<Options>
				<CheckboxOption>
					<Text>Disable Hibernation</Text>
					<Name>disable-hibernation</Name>
				</CheckboxOption>
				<CheckboxOption>
					<Text>Maximum Performance (Disable Power Saving)</Text>
					<Name>disable-power-saving</Name>
				</CheckboxOption>
				<CheckboxOption>
					<Text>Disable Core Isolation (+15% FPS, less secure)</Text>
					<Name>disable-core-isolation</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>
		<CheckboxPage IsRequired="true" Description="Select optional components to remove.">
			<Options>
				<CheckboxOption>
					<Text>Remove Microsoft Edge</Text>
					<Name>uninstall-edge</Name>
				</CheckboxOption>
				<CheckboxOption>
					<Text>Install a Browser</Text>
					<Name>install-another-browser</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>
		<RadioImagePage CheckDefaultBrowser="true" DependsOn="install-another-browser" DefaultOption="browser-brave" Description="Select your preferred browser.">
			<Options>
				<RadioImageOption>
					<Text>Brave</Text>
					<Name>browser-brave</Name>
					<FileName>brave</FileName>
					<GradientTopColor>#131524</GradientTopColor>
					<GradientBottomColor>#3b3e4f</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>Firefox</Text>
					<Name>browser-firefox</Name>
					<FileName>firefox</FileName>
					<GradientTopColor>#FF3647</GradientTopColor>
					<GradientBottomColor>#FFC742</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>Chrome</Text>
					<Name>browser-chrome</Name>
					<FileName>chrome</FileName>
					<GradientTopColor>#7E7E7E</GradientTopColor>
					<GradientBottomColor>#D0D0D0</GradientBottomColor>
				</RadioImageOption>
			</Options>
		</RadioImagePage>
	</FeaturePages>
</Playbook>
